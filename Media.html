<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Archivio Personale - Log</title>
    <style>
        /* STILE ISPIRATO A SCARUFFI + FUNZIONALITÀ EXCEL */
        body { 
            font-family: "Times New Roman", Times, serif; 
            max-width: 900px; 
            margin: 40px auto; 
            padding: 20px; 
            line-height: 1.5; 
            color: #1a1a1a; 
            background-color: #fdfdfd;
        }
        h1 { font-size: 1.8rem; text-decoration: underline; text-align: center; text-transform: uppercase; }
        
        /* Menu di navigazione rapida */
        .nav-menu { 
            text-align: center; 
            margin-bottom: 40px; 
            border-top: 1px solid #000; 
            border-bottom: 1px solid #000; 
            padding: 10px; 
            font-size: 0.9rem; 
        }
        .nav-menu a { margin: 0 10px; text-decoration: none; color: #000; font-weight: bold; }
        .nav-menu a:hover { text-decoration: underline; }

        .section-header { 
            font-weight: bold; 
            font-size: 1.3rem; 
            margin-top: 40px; 
            border-bottom: 2px solid #000; 
            display: block; 
            text-transform: uppercase; 
        }
        
        ul { list-style-type: none; padding-left: 0; }
        li { 
            margin-bottom: 12px; 
            padding: 5px; 
            border-bottom: 1px dotted #ccc; 
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }
        li:hover { background-color: #f4f4f4; }

        /* Tag stilizzati come le colonne di Excel */
        .tag { 
            font-size: 0.65rem; 
            font-family: monospace; 
            padding: 2px 4px; 
            margin-left: 8px; 
            border: 1px solid #000; 
            text-transform: uppercase; 
            display: inline-block;
        }
        .tag-country { background-color: #eee; font-weight: bold; min-width: 25px; text-align: center; }
        .tag-status { border-style: dashed; color: #666; }
        .tag-timeline { background-color: #000; color: #fff; border: none; }

        /* Testo dell'opera */
        .entry-text { flex-grow: 1; }
        b { font-size: 1.1rem; }

        footer { margin-top: 100px; font-size: 0.8rem; text-align: center; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>
